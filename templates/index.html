<!DOCTYPE html>
<html>
<head>
    <title>TruthLens AI</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 80%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.08);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #cbd5e1;
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 180px;
            border-radius: 12px;
            border: none;
            padding: 15px;
            font-size: 16px;
            resize: none;
            outline: none;
        }

        button {
            margin-top: 20px;
            padding: 14px 35px;
            border: none;
            border-radius: 30px;
            background: #38bdf8;
            color: #020617;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        .result-box {
            margin-top: 30px;
            padding: 25px;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
        }

        .real {
            color: #22c55e;
        }

        .fake {
            color: #ef4444;
        }

        .confidence {
            font-size: 22px;
            margin-top: 10px;
        }

        .explanation {
            color: #e2e8f0;
            margin-top: 15px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TruthLens AI</h1>
    <p class="subtitle">AI-powered fake news detection system</p>

    <form method="POST">
        <textarea name="news" placeholder="Paste a news headline or article here..." required></textarea>
        <br>
        <button type="submit">Analyze News</button>
    </form>

    {% if result %}
    <div class="result-box">
        {% if result == "REAL" %}
            <h2 class="real">REAL NEWS</h2>
        {% else %}
            <h2 class="fake">FAKE NEWS</h2>
        {% endif %}

        <p class="confidence">Confidence: {{ confidence }}%</p>

        <p class="explanation">
            {{ explanation }}
        </p>
    </div>
    {% endif %}
</div>

</body>
</html>
