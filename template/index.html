<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detector</title>
</head>
<body>
    <h1>Fake News Detection Web App</h1>

    <form method="POST">
        <textarea name="news" rows="10" cols="60" placeholder="Enter news headline or article" required></textarea>
        <br><br>
        <button type="submit">Check News</button>
    </form>

    {% if result %}
        <h2>Result: {{ result }}</h2>
    {% endif %}
</body>
</html>
